<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clickjacking Scanner</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 700px;
    background: #fff;
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
  }

  h1 {
    text-align: center;
    margin-bottom: 10px;
    color: #0f172a;
  }

  .subtitle {
    text-align: center;
    color: #64748b;
    margin-bottom: 30px;
  }

  .input-group {
    display: flex;
    gap: 10px;
  }

  input {
    flex: 1;
    padding: 14px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    outline: none;
    font-size: 16px;
  }

  input:focus {
    border-color: #3b82f6;
  }

  button {
    padding: 14px 24px;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #1d4ed8;
  }

  .loader {
    display: none;
    text-align: center;
    margin-top: 25px;
    color: #64748b;
  }

  .result {
    display: none;
    margin-top: 25px;
    padding: 20px;
    border-radius: 15px;
  }

  .safe {
    background: #dcfce7;
    border: 2px solid #22c55e;
  }

  .vulnerable {
    background: #fee2e2;
    border: 2px solid #ef4444;
  }

  .result h2 {
    margin-bottom: 15px;
  }

  .info {
    margin-top: 10px;
    word-break: break-word;
  }

  .label {
    font-weight: 600;
    color: #334155;
  }

  pre {
    background: #0f172a;
    color: #f8fafc;
    padding: 12px;
    border-radius: 10px;
    overflow: auto;
    margin-top: 5px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🛡️ Clickjacking Scanner</h1>
  <p class="subtitle">
    Check if a website is protected against clickjacking attacks
  </p>

  <div class="input-group">
    <input type="url" id="url" placeholder="https://example.com" />
    <button onclick="scanWebsite()">Scan</button>
  </div>

  <div class="loader" id="loader">Scanning website...</div>

  <div id="result" class="result"></div>
</div>

<script>
  const API_URL = "http://localhost:8000/send-url";

  async function scanWebsite() {
    const url = document.getElementById("url").value.trim();

    if (!url) {
      alert("Please enter a URL");
      return;
    }

    const loader = document.getElementById("loader");
    const resultDiv = document.getElementById("result");

    loader.style.display = "block";
    resultDiv.style.display = "none";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ url }),
      });

      const data = await res.json();

      loader.style.display = "none";
      resultDiv.style.display = "block";

      if (data.vulnerable) {
        resultDiv.className = "result vulnerable";

        resultDiv.innerHTML = `
            <h2>❌ Vulnerable to Clickjacking</h2>

            <div class="info">
                The website does not appear to have
                clickjacking protection headers.
            </div>

            <div class="info">
                <span class="label">X-Frame-Options:</span>
                ${data.xfo || "Not Found"}
            </div>

            <div class="info">
                <span class="label">Content-Security-Policy:</span>
                ${data.csp || "Not Found"}
            </div>
        `;
      } else {
        resultDiv.className = "result safe";

        resultDiv.innerHTML = `
            <h2>✅ Protected</h2>

            <div class="info">
                Clickjacking protection headers detected.
            </div>

            <div class="info">
                <span class="label">X-Frame-Options</span>
                <pre>${data.xfo || "Not Present"}</pre>
            </div>

            <div class="info">
                <span class="label">Content-Security-Policy</span>
                <pre>${data.csp || "Not Present"}</pre>
            </div>
        `;
      }
    } catch (error) {
      loader.style.display = "none";
      resultDiv.style.display = "block";
      resultDiv.className = "result vulnerable";

      resultDiv.innerHTML = `
        <h2>⚠ Error</h2>
        <p>${error.message}</p>
    `;
    }
  }
</script>
</body>
</html>
