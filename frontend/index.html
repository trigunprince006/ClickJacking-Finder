<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clickjacking Scanner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>🛡️ Clickjacking Scanner</h1>
  <p class="subtitle">
    Check if a website is protected against clickjacking attacks
  </p>

  <div class="input-group">
    <input type="url" id="url" placeholder="https://example.com" />
    <button onclick="scanWebsite()">Scan</button>
  </div>

  <div class="loader" id="loader">Scanning website...</div>

  <div id="result" class="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
